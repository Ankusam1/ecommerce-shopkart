<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="mb-4">🛒 Your Cart</h2>

{% if items %}

<table class="table table-bordered shadow bg-white">

<thead class="table-dark">
<tr>
<th>Product</th>
<th>Name</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody>

{% for i in items %}

<tr>

<td>
<img src="{{i.product.image.url}}" width="70">
</td>

<td>
{{i.product.name}}
</td>

<td>
₹ {{i.product.price}}
</td>

<td>
{{i.quantity}}
</td>

<td>
₹ {{i.product.price|floatformat:2}}
</td>

<td>
<a href="{% url 'remove_cart' i.id %}" class="btn btn-danger btn-sm">
Remove
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

<div class="text-end">

<h4>Total: ₹ {{total}}</h4>

<a href="/checkout/" class="btn btn-success">
Proceed to Checkout
</a>

</div>

{% else %}

<div class="alert alert-info">
Your cart is empty.
</div>

{% endif %}

</div>

</body>
</html>
